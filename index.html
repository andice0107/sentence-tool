        const Icon = ({ name, size = 20, className = "" }) => {
            if (!window.lucide || !window.lucide.icons[name]) return null;
            
            const iconData = window.lucide.icons[name];
            // iconData 通常是一個包含標籤與屬性的數組
            const svgContent = iconData.map(([tag, attrs]) => {
                const attrStr = Object.entries(attrs).map(([k, v]) => `${k}="${v}"`).join(' ');
                return `<${tag} ${attrStr}></${tag}>`;
            }).join('');

            return (
                <svg
                    width={size}
                    height={size}
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth="2"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={className}
                    dangerouslySetInnerHTML={{ __html: svgContent }}

            const [drawMode, setDrawMode] = useState('random'); 
            const [sentencePattern, setSentencePattern] = useState(""); 
            
            const [showHistoryModal, setShowHistoryModal] = useState(null); 
            const [showSettings, setShowSettings] = useState(false);
            const [showDataEditor, setShowDataEditor] = useState(false); 
            const [editingCategory, setEditingCategory] = useState(null); 
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [isAiDrawing, setIsAiDrawing] = useState(false);
            const [aiSentence, setAiSentence] = useState("");
            const [isInstructorOpen, setIsInstructorOpen] = useState(false);

            const isExhausted = (category) => {
                if (allowRepeat) return false;
                const historyCount = histories[category]?.length || 0;
                const totalCount = dataStore[category]?.length || 0;
                return historyCount >= totalCount && totalCount > 0;
            };

            const drawSingle = (category) => {
                const pool = dataStore[category] || [];
                const history = histories[category] || [];
                let available = allowRepeat ? pool : pool.filter(item => !history.includes(item));
                if (available.length === 0) return null;
                const result = available[Math.floor(Math.random() * available.length)];
                setCurrentResults(prev => ({ ...prev, [category]: result }));
                setHistories(prev => ({ ...prev, [category]: [...(prev[category] || []), result] }));
                return result;
            };

            const resetCategory = (category) => {
                setHistories(prev => ({ ...prev, [category]: [] }));
                setCurrentResults(prev => { const n = {...prev}; delete n[category]; return n; });
            };

            const handleDrawAll = async () => {
                if (drawMode === 'random') {
                    visibleCategories.forEach(k => drawSingle(k));
                } else {
                    setIsAiDrawing(true);
                    try {
                        const activeKeys = visibleCategories;
                        const isPattern = drawMode === 'pattern' && sentencePattern.trim();
                        const systemPrompt = `你是一個資長的寫作指導老師。請幫我從分類選詞。輸出 JSON：{"標籤": "詞彙"}。${isPattern ? `考量句型「${sentencePattern}」。` : ''}`;
                        const userPrompt = `從分類選詞：${activeKeys.map(k => `${k}: [${dataStore[k].slice(0,20).join(', ')}]`).join('\n')}`;
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: userPrompt }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] },
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        });
                        const data = await response.json();
                        if (!data.candidates?.[0]?.content?.parts?.[0]?.text) throw new Error("API回傳異常");
                        const result = JSON.parse(data.candidates[0].content.parts[0].text);
                        const newResults = { ...currentResults };
                        const newHistories = { ...histories };
                        activeKeys.forEach(k => {
                            if (result[k]) {
                                newResults[k] = result[k];
                                newHistories[k] = [...(newHistories[k] || []), result[k]];
                            } else {
                                drawSingle(k);
                            }
                        });
                        setCurrentResults(newResults);
                        setHistories(newHistories);
                    } catch (e) {
                        visibleCategories.forEach(k => drawSingle(k));
                    } finally { setIsAiDrawing(false); }
                }
            };

            const generateSentence = async () => {
                if (Object.keys(currentResults).length === 0) return;
                setIsAiLoading(true); setAiSentence(""); setIsInstructorOpen(true);
                try {
                    const words = Object.entries(currentResults).filter(([k]) => visibleCategories.includes(k)).map(([k,v]) => `${k}: ${v}`).join(', ');
                    const isPattern = drawMode === 'pattern' && sentencePattern.trim();
                    const prompt = `語詞造句：${words}。不要用任何特殊符號（如星號或下劃線）標示語詞。${isPattern ? `必須使用句型：「${sentencePattern}」。` : ''}`;
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await response.json();
                    const output = data.candidates?.[0]?.content?.parts?.[0]?.text || "造句失敗。";
                    setAiSentence(output);
                } catch (e) { setAiSentence("造句失敗。"); } finally { setIsAiLoading(false); }
            };

            const renderHighlightedSentence = (sentence) => {
                if (!sentence) return null;
                // 移除 Markdown 符號與下劃線
                const clean = sentence.replace(/[\*_`]/g, '');
                const keywords = visibleCategories.map(cat => currentResults[cat]).filter(Boolean).sort((a,b) => b.length - a.length);
                if (keywords.length === 0) return clean;
                
                const escapedKeywords = keywords.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
                const regex = new RegExp(`(${escapedKeywords.join('|')})`, 'g');
                
                return clean.split(regex).map((part, i) => {
                    if (keywords.includes(part)) {
                        return (
                            <span key={i} className="text-indigo-600 underline underline-offset-8 decoration-indigo-300 decoration-2 font-black mx-1 inline-block">
                                {part}
                            </span>
                        );
                    }
                    return part;
                });
            };

            const gridClass = useMemo(() => {
                const c = visibleCategories.length;
                if (c <= 4) return "grid-cols-1 sm:grid-cols-2";
                if (c <= 6) return "grid-cols-2 sm:grid-cols-3";
                if (c <= 9) return "grid-cols-3 sm:grid-cols-4";
                return "grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6";
            }, [visibleCategories]);

            return (
                <div className="flex flex-col h-screen bg-[#f8fafc] text-slate-800 overflow-hidden">
                    {/* 頂部導覽列 */}
                    <header className="bg-white border-b px-6 py-3 flex items-center justify-between shadow-sm z-30 shrink-0">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-600 p-2 rounded-2xl text-white shadow-xl">
                                <Icon name="BookOpen" size={24} />
                            </div>
                            <div>
                                <h1 className="text-xl font-black text-slate-900 leading-none mb-1">造句靈感抽卡器</h1>
                                <p className="text-[10px] font-bold text-slate-400 tracking-widest uppercase">Sentence Creative Lab</p>
                            </div>
                            
                            {/* 工具使用說明圖示 (Tooltip) */}
                            <div className="relative ml-2 tooltip-trigger">
                                <button className="p-1 text-slate-300 hover:text-indigo-500 transition-colors">
                                    <Icon name="HelpCircle" size={20} />
                                </button>
                                <div className="absolute top-10 left-0 w-72 bg-slate-800 text-white p-5 rounded-2xl text-xs z-[100] shadow-2xl border border-slate-700 pointer-events-none tooltip-box">
                                    <h4 className="font-black mb-3 text-sm border-b border-slate-600 pb-2 flex items-center gap-2">
                                        <Icon name="Sparkles" size={14} className="text-yellow-400" /> 工具使用說明
                                    </h4>
                                    <ul className="space-y-2 opacity-90 leading-relaxed">
                                        <li>1. 點擊卡片底部的「DRAW」可單獨抽取該類型。</li>
                                        <li>2. 「一鍵全抽」可快速抽取所有顯示中卡片。</li>
                                        <li>3. 「合理情境」：AI 會進行邏輯配對抽取。</li>
                                        <li>4. 「指定句型」：限制抽卡與造句的架構。</li>
                                        <li>5. 點擊「📐」圖示可進入自定義管理。</li>
                                    </ul>
                                </div>
                            </div>
                        </div>

                        <div className="flex items-center gap-3">
                            {/* 抽卡模式選單 */}
                            <div className="hidden lg:flex items-center gap-3 bg-slate-50 p-1.5 rounded-2xl border border-slate-100 shadow-inner">
                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">抽卡模式</span>
                                <div className="flex gap-1">
                                    {['random', 'logical', 'pattern'].map(m => (
                                        <button key={m} onClick={() => setDrawMode(m)} className={`px-4 py-1.5 text-xs font-black rounded-xl transition-all ${drawMode === m ? 'bg-white shadow-sm text-indigo-600 border border-indigo-50' : 'text-slate-400 hover:text-slate-600'}`}>
                                            {m === 'random' ? '絕對亂數' : m === 'logical' ? '合理情境' : '指定句型'}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <button onClick={() => setShowDataEditor(true)} className="p-2.5 bg-slate-50 border rounded-xl hover:bg-slate-100 text-slate-600" title="自定義資料">
                                <Icon name="Layout" size={20} />
                            </button>

                            <button onClick={() => setShowSettings(!showSettings)} className={`p-2.5 rounded-xl transition-all bg-white border hover:bg-slate-50 ${showSettings ? 'bg-indigo-50 text-indigo-600' : ''}`} title="系統設定">
                                <Icon name="Settings" size={20} />
                            </button>
                            
                            <button onClick={handleDrawAll} disabled={isAiDrawing} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-2xl font-black shadow-lg flex items-center gap-2 active:scale-95">
                                {isAiDrawing ? <div className="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full" /> : <Icon name="ListRestart" size={20} />} 一鍵全抽
                            </button>
                        </div>
                    </header>

                    {/* 指定句型輸入 */}
                    {drawMode === 'pattern' && (
                        <div className="bg-indigo-50 border-b px-6 py-2 flex items-center gap-4 animate-in slide-in-from-top-2">
                            <Icon name="Type" size={16} className="text-indigo-700" />
                            <input 
                                type="text" 
                                placeholder="例如：一邊…一邊…/雖然…但是…/只要…就…/（主詞）（時間）都會（動詞）" 
                                className="flex-1 bg-white border-2 border-indigo-200 rounded-xl px-4 py-1.5 text-sm font-bold focus:outline-none focus:border-indigo-400 placeholder:text-slate-300" 
                                value={sentencePattern} 
                                onChange={e => setSentencePattern(e.target.value)} 
                            />
                        </div>
                    ) }

                    {/* 設定面板 */}
                    {showSettings && (
                        <div className="absolute top-16 right-6 w-96 bg-white border-2 shadow-2xl rounded-[2.5rem] p-6 z-50 animate-in">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="font-black text-xl text-slate-900">工具箱設定</h3>
                                <button onClick={() => setShowSettings(false)} className="text-slate-400 hover:text-slate-600">
                                    <Icon name="X" size={20} />
                                </button>
                            </div>
                            <div className="space-y-6">
                                <label className="flex items-center justify-between p-4 bg-slate-50 rounded-3xl cursor-pointer">
                                    <div><span className="font-black block text-slate-800">允許重複抽出</span><span className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Duplicate allowed</span></div>
                                    <input type="checkbox" checked={allowRepeat} onChange={() => setAllowRepeat(!allowRepeat)} className="w-6 h-6 rounded-lg text-indigo-600" />
                                </label>
                                <div>
                                    <span className="font-black block mb-3 text-slate-800 px-1 text-sm uppercase">顯示卡片類型</span>
                                    <div className="grid grid-cols-2 gap-2 max-h-[30vh] overflow-y-auto p-2 border-2 border-slate-50 rounded-3xl bg-slate-50/50">
                                        {Object.keys(dataStore).map(cat => (
                                            <label key={cat} className={`flex items-center gap-2 p-3 rounded-2xl cursor-pointer border ${visibleCategories.includes(cat) ? 'bg-white border-indigo-200 text-indigo-700 shadow-sm' : 'bg-transparent text-slate-400 opacity-60'}`}>
                                                <input type="checkbox" checked={visibleCategories.includes(cat)} onChange={e => {
                                                    if (e.target.checked) setVisibleCategories([...visibleCategories, cat]);
                                                    else if (visibleCategories.length > 1) setVisibleCategories(visibleCategories.filter(v => v !== cat));
                                                }} />
                                                <span className="text-xs font-black">{cat}</span>
                                            </label>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 自定義內容管理 */}
                    {showDataEditor && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-[60] flex items-center justify-center p-6">
                            <div className="bg-white w-full max-w-5xl h-[85vh] rounded-[3rem] shadow-2xl flex flex-col overflow-hidden animate-in">
                                <div className="p-8 border-b flex justify-between items-center bg-slate-50">
                                    <div className="flex items-center gap-4">
                                        <div className="bg-indigo-600 p-3 rounded-2xl text-white shadow-lg"><Icon name="Edit3" size={24} /></div>
                                        <div><h2 className="text-2xl font-black text-slate-900">自定義內容管理</h2><p className="text-xs font-bold text-slate-400">增減類型與語詞內容</p></div>
                                    </div>
                                    <button onClick={() => {setShowDataEditor(false); setEditingCategory(null);}} className="p-2 border rounded-full hover:bg-slate-200 transition-colors"><Icon name="X" size={20}/></button>
                                </div>
                                <div className="flex-1 flex overflow-hidden">
                                    <div className="w-1/3 border-r overflow-y-auto p-6 space-y-2">
                                        <button onClick={() => {
                                            const n = window.prompt("請輸入新類型名稱：");
                                            if (n && !dataStore[n]) { setDataStore({...dataStore, [n]:[]}); setHistories({...histories, [n]:[]}); setVisibleCategories([...visibleCategories, n]); }
                                        }} className="w-full p-4 border-2 border-dashed border-indigo-200 text-indigo-600 rounded-3xl font-black flex items-center justify-center gap-2 hover:bg-indigo-50 transition-all mb-4">
                                            <Icon name="Plus" size={20} /> 新增類型
                                        </button>
                                        {Object.keys(dataStore).map(cat => (
                                            <div key={cat} className={`group flex items-center justify-between p-4 rounded-3xl border-2 transition-all cursor-pointer ${editingCategory === cat ? 'bg-indigo-600 border-indigo-600 text-white shadow-xl' : 'bg-white hover:border-indigo-100'}`} onClick={() => setEditingCategory(cat)}>
                                                <span className="font-bold">{cat}</span>
                                                <button onClick={(e) => {
                                                    e.stopPropagation();
                                                    if(window.confirm(`確定要刪除「${cat}」類型嗎？`)) {
                                                        const next = {...dataStore}; delete next[cat]; setDataStore(next);
                                                        setVisibleCategories(visibleCategories.filter(v => v !== cat));
                                                    }
                                                }} className="p-1.5 opacity-0 group-hover:opacity-100 hover:bg-red-500 rounded-lg text-slate-400 hover:text-white transition-all"><Icon name="Trash2" size={14}/></button>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="flex-1 bg-slate-50 p-8">
                                        {editingCategory ? (
                                            <div className="h-full flex flex-col animate-in">
                                                <h4 className="font-black text-slate-900 mb-4 text-lg">正在編輯：<span className="text-indigo-600">{editingCategory}</span></h4>
                                                <textarea className="flex-1 w-full bg-white border-2 rounded-[2rem] p-6 font-bold text-lg focus:outline-none focus:border-indigo-400 resize-none shadow-inner leading-relaxed" placeholder="每行輸入一個語詞..." value={(dataStore[editingCategory] || []).join('\n')} onChange={e => {
                                                    const words = [...new Set(e.target.value.split('\n').map(s => s.trim()).filter(s => s))];
                                                    setDataStore({...dataStore, [editingCategory]: words});
                                                }} />
                                            </div>
                                        ) : <div className="h-full flex flex-col items-center justify-center text-slate-300 opacity-50"><Icon name="Edit3" size={64} /><p className="font-black text-xl mt-4">請從左側選擇類型</p></div>}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 主卡片區 */}
                    <main className="flex-1 p-6 flex flex-col items-center justify-center min-h-0">
                        <div className={`grid ${gridClass} gap-4 w-full h-full max-w-[1600px]`}>
                            {visibleCategories.map(cat => (
                                <div key={cat} className={`relative flex flex-col rounded-[2.5rem] border-4 shadow-2xl overflow-hidden transition-all duration-300 ${currentResults[cat] ? 'scale-100' : 'opacity-40 scale-95'} ${COLOR_MAP[cat] || 'bg-white border-slate-200'}`}>
                                    <div className="px-5 py-3 flex justify-between bg-black/5 items-center">
                                        <span className="text-[10px] font-black uppercase opacity-60 tracking-wider font-mono">{cat}</span>
                                        <div className="flex gap-2">
                                            <button onClick={() => setShowHistoryModal(cat)} className="hover:scale-110 transition-transform" title="紀錄"><Icon name="History" size={14}/></button>
                                            <button onClick={() => resetCategory(cat)} className="hover:scale-110 transition-transform" title="重置"><Icon name="RotateCcw" size={14}/></button>
                                        </div>
                                    </div>
                                    <div className="flex-1 flex items-center justify-center p-6 text-center min-h-0">
                                        {currentResults[cat] ? <div className="text-xl sm:text-2xl font-black text-slate-900 animate-in drop-shadow-sm leading-tight">{currentResults[cat]}</div> : <div className="text-slate-400 text-[10px] tracking-[0.3em] opacity-20 italic font-black uppercase">READY</div>}
                                    </div>
                                    <button onClick={() => drawSingle(cat)} disabled={isExhausted(cat)} className="py-5 text-xs font-black tracking-widest bg-black/10 hover:bg-black/20 active:scale-95 disabled:opacity-50 uppercase">
                                        {isExhausted(cat) ? "Empty" : "DRAW"}
                                    </button>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* 收摺式造句指導員 */}
                    <section className={`fixed bottom-0 left-0 right-0 bg-white border-t-2 shadow-2xl transition-all duration-500 z-40 ${isInstructorOpen ? 'translate-y-0' : 'translate-y-[calc(100%-48px)]'}`}>
                        <button onClick={() => setIsInstructorOpen(!isInstructorOpen)} className="w-full h-12 flex items-center justify-center gap-2 bg-slate-50 hover:bg-slate-100 transition-colors border-b">
                            {isInstructorOpen ? <Icon name="ChevronDown" size={16}/> : <Icon name="ChevronUp" size={16}/>}
                            <Icon name="Sparkles" size={16} className="text-indigo-600" /> <span className="text-xs font-black text-slate-500 tracking-widest uppercase">造句指導員</span>
                        </button>
                        <div className="p-8 md:px-16 max-w-7xl mx-auto flex flex-col md:flex-row gap-8 items-center">
                            <div className="flex-1 w-full bg-indigo-50 border-4 border-dashed border-indigo-100 rounded-[2.5rem] p-8 flex items-center justify-center text-center shadow-inner">
                                {isAiLoading ? <div className="animate-pulse font-black text-indigo-500">正在為您構思精采內容...</div> : <div className="text-xl md:text-3xl font-bold font-serif tracking-wide leading-relaxed">「 {renderHighlightedSentence(aiSentence) || "準備就緒，點擊右側按鈕造句" } 」</div>}
                            </div>
                            <button onClick={generateSentence} disabled={isAiLoading || !Object.keys(currentResults).length} className="bg-slate-900 text-white px-12 py-8 rounded-[2rem] font-black flex flex-col items-center gap-3 active:scale-95 transition-all disabled:bg-slate-200">
                                <div className="bg-indigo-500 p-3 rounded-2xl shadow-lg shadow-indigo-500/30 transition-transform hover:scale-110"><Icon name="Sparkles" size={28} /></div><span className="text-xs tracking-widest">生成句子</span>
                            </button>
                        </div>
                    </section>

                    {/* 歷史紀錄彈窗 */}
                    {showHistoryModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-md z-[100] flex items-center justify-center p-6" onClick={() => setShowHistoryModal(null)}>
                            <div className="bg-white w-full max-w-md rounded-[3rem] overflow-hidden animate-in shadow-2xl" onClick={e => e.stopPropagation()}>
                                <div className={`p-6 text-center font-black text-xl flex justify-between items-center ${COLOR_MAP[showHistoryModal] || 'bg-slate-200'}`}>
                                    <div className="flex items-center gap-3"><Icon name="History" size={24} /> <span>抽卡紀錄</span></div><button onClick={() => setShowHistoryModal(null)} className="hover:rotate-90 transition-transform"><Icon name="X" size={20}/></button>
                                </div>
                                <div className="p-6 space-y-3 max-h-[60vh] overflow-y-auto bg-slate-50">
                                    {(histories[showHistoryModal] || []).length > 0 ? histories[showHistoryModal].map((v, i) => (
                                        <div key={i} className="flex items-center gap-4 p-4 bg-white rounded-2xl border-2 border-slate-100 shadow-sm"><span className="w-8 h-8 rounded-full bg-slate-900 text-white text-xs font-black flex items-center justify-center shrink-0">{(i+1).toString().padStart(2, '0')}</span><span className="font-bold text-lg">{v}</span></div>
                                    )) : <div className="text-center py-10 opacity-30 font-black tracking-widest">尚無紀錄</div>}
                                </div>
                                <div className="p-4 bg-white border-t flex justify-center">
                                    <button onClick={() => setShowHistoryModal(null)} className="px-10 py-2 bg-slate-900 text-white rounded-full font-black text-sm active:scale-95 transition-all">關閉</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
