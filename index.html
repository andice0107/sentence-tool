<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>造句靈感抽卡器</title>
    <!-- 載入 React 核心庫 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 載入 Babel 編譯器 (讓瀏覽器能直接執行 JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 Lucide 圖示庫 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .animate-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Tooltip 說明視窗樣式 */
        .tooltip-box {
            visibility: hidden;
            opacity: 0;
            transition: all 0.2s ease-in-out;
            transform: translateY(5px);
        }
        .tooltip-trigger:hover .tooltip-box {
            visibility: visible;
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 這裡絕對沒有 import 語句
        const { useState, useEffect, useMemo, useRef } = React;

        // 穩定的圖示渲染組件
        const Icon = ({ name, size = 20, className = "" }) => {
            const [svg, setSvg] = useState('');
            useEffect(() => {
                if (window.lucide && window.lucide.icons[name]) {
                    const iconData = window.lucide.icons[name];
                    const content = iconData.map(([tag, attrs]) => {
                        const attrStr = Object.entries(attrs).map(([k, v]) => `${k}="${v}"`).join(' ');
                        return `<${tag} ${attrStr}></${tag}>`;
                    }).join('');
                    setSvg(content);
                }
            }, [name]);

            return (
                <svg
                    width={size}
                    height={size}
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth="2"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={className}
                    dangerouslySetInnerHTML={{ __html: svg }}
                />
            );
        };

        const MODEL_NAME = "gemini-2.5-flash-preview-09-2025";

        const INITIAL_RAW_DATA = {
            "什麼人物": "大雄##胖虎##靜香##哆拉A夢##小夫##爸爸##媽媽##爺爺##奶奶##外公##外婆##警察##老師##老闆##店員##廚師##志工##市長##總統##皮卡丘##小智##阿奇##王叔叔##阿姨##姑姑##姑丈##司機##校長##主任##同學##姨丈##伯父##伯母##舅舅##舅媽##導護老師##消防員##郵差##學生##清潔人員##救生員##教練##教授##運動選手##畫畫老師##魔術師##醫生##護士##農夫##漁夫##外送員##送貨員##銀行銀員##工程師##歌手##訓獸師##外星人##太空人##機長##火車站長##哆啦美##胖虎媽媽##大雄爸爸##靜香媽媽##靜香爸爸##出木杉##技安妹##鄰居神成先生##記者##律師##藥師##攝影師##保全人員##救護員##維修人員##圖書館員##園丁##服務生##導遊##機車行老闆##漫畫家##模特兒##裁判##救難隊員##魔術師助理##太空總署署員##航海家##登山客##探險家##考古學家",
            "什麼時間": "早上##下午##晚上##看書時##放學後##吃飽後##上學路上##清晨##半夜##午餐時間##慶生時##寫作業時##看電視時##比賽中",
            "什麼地點": "公園##操場##教室##餐廳##公車上##火車上##飛機上##海邊##圖書館##博物館##書店##捷運站##動物園",
            "什麼動作": "舉手##吐舌頭##喝##吹##拍##看##聽##聞##摸##欣賞##修復##挖掘##紀錄##握手##揮動",
            "什麼事情": "扮鬼臉##跑步##野餐##煮菜##畫畫##跳繩##看電視##打球##玩遊戲##觀察昆蟲##剪紙##寫書法",
            "什麼物品": "保溫瓶##平板##手機##電腦##鉛筆##書包##錢包##眼鏡##手錶##悠遊卡##望遠鏡##指南針",
            "為何理由": "為了慶祝##因為口渴##由於好奇##為了健康##因為生氣##由於害怕##為了比賽##為了夢想##為了環保",
            "如何狀態": "非常緩慢地##極其迅速地##十分用力地##安安靜靜地##專心致志地##滿頭大汗地##小心翼翼地##誠誠懇懇地",
            "心情感受": "興奮愉快##難過憂傷##怒火中燒##欣喜若狂##忐忑不安##驚喜交加##感動萬分##滿腔怒火",
            "個性特質": "活潑開朗##溫柔體貼##勤奮好學##善良大方##剛正不阿##見義勇為##追求完美",
            "AA疊詞": "大大##小小##快快##慢慢##冰冰##熱熱##涼涼##白白##紅紅##綠綠##亮亮##暗暗",
            "AAB疊詞": "毛毛雨##洗洗手##刷刷牙##洗洗臉##點點頭##招招手##聊聊天##看看書",
            "ABB疊詞": "紅通通##白茫茫##綠油油##涼冰冰##熱乎乎##香噴噴##胖嘟嘟##氣呼呼##笑瞇瞇"
        };

        const COLOR_MAP = {
            "什麼人物": "bg-[#ffe4e1] border-[#ffc1c1] text-red-900",
            "什麼時間": "bg-[#e3f2fd] border-[#bbdefb] text-blue-900",
            "什麼地點": "bg-[#fce4ec] border-[#f8bbd0] text-pink-900",
            "什麼動作": "bg-[#b8860b] border-[#926b09] text-white",
            "什麼事情": "bg-[#fff3e0] border-[#ffe0b2] text-orange-900",
            "什麼物品": "bg-[#ffe0b2] border-[#ffcc80] text-orange-950",
            "為何理由": "bg-[#f3e5f5] border-[#e1bee7] text-purple-900",
            "如何狀態": "bg-[#e8f5e9] border-[#c8e6c9] text-emerald-900",
            "心情感受": "bg-[#e8eaf6] border-[#c5cae9] text-indigo-900",
            "個性特質": "bg-[#e0f2f1] border-[#b2dfdb] text-teal-900",
            "AA疊詞": "bg-slate-50 border-slate-200 text-slate-900",
            "AAB疊詞": "bg-slate-100 border-slate-300 text-slate-950",
            "ABB疊詞": "bg-slate-200 border-slate-400 text-black",
        };

        function App() {
            const [dataStore, setDataStore] = useState(() => Object.entries(INITIAL_RAW_DATA).reduce((acc, [key, value]) => { acc[key] = [...new Set(value.split('##'))]; return acc; }, {}));
            const [visibleCategories, setVisibleCategories] = useState(["什麼人物", "什麼時間", "什麼地點", "什麼動作", "什麼事情", "什麼物品"]);
            const [currentResults, setCurrentResults] = useState({}); 
            const [histories, setHistories] = useState(Object.keys(INITIAL_RAW_DATA).reduce((acc, k) => ({...acc, [k]: []}), {}));
            const [allowRepeat, setAllowRepeat] = useState(false);
            const [drawMode, setDrawMode] = useState('random'); 
            const [sentencePattern, setSentencePattern] = useState(""); 
            const [userApiKey, setUserApiKey] = useState(localStorage.getItem('gemini_api_key') || "");
            
            const [showHistoryModal, setShowHistoryModal] = useState(null); 
            const [showSettings, setShowSettings] = useState(false);
            const [showDataEditor, setShowDataEditor] = useState(false); 
            const [editingCategory, setEditingCategory] = useState(null); 
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [isAiDrawing, setIsAiDrawing] = useState(false);
            const [aiSentence, setAiSentence] = useState("");
            const [isInstructorOpen, setIsInstructorOpen] = useState(false);
            const [showHelpTooltip, setShowHelpTooltip] = useState(false);

            useEffect(() => { localStorage.setItem('gemini_api_key', userApiKey); }, [userApiKey]);

            const isExhausted = (category) => !allowRepeat && histories[category]?.length >= dataStore[category]?.length && dataStore[category]?.length > 0;

            const drawSingle = (category) => {
                const pool = dataStore[category] || [];
                const history = histories[category] || [];
                let available = allowRepeat ? pool : pool.filter(item => !history.includes(item));
                if (available.length === 0) return null;
                const result = available[Math.floor(Math.random() * available.length)];
                setCurrentResults(prev => ({ ...prev, [category]: result }));
                setHistories(prev => ({ ...prev, [category]: [...(prev[category] || []), result] }));
                return result;
            };

            const resetCategory = (category) => {
                setHistories(prev => ({ ...prev, [category]: [] }));
                setCurrentResults(prev => { const n = {...prev}; delete n[category]; return n; });
            };

            const handleDrawAll = async () => {
                if (drawMode === 'random') {
                    visibleCategories.forEach(k => drawSingle(k));
                } else {
                    if (!userApiKey) { setAiSentence("請點擊設定（⚙️）填寫 API 金鑰。"); setIsInstructorOpen(true); return; }
                    setIsAiDrawing(true);
                    try {
                        const activeKeys = visibleCategories;
                        const isPattern = drawMode === 'pattern' && sentencePattern.trim();
                        const systemPrompt = `資深老師選詞。JSON：{"標籤": "詞彙"}。${isPattern ? `考量句型「${sentencePattern}」` : ''}`;
                        const userPrompt = `各類選一：${activeKeys.map(k => `${k}: [${dataStore[k].slice(0,15).join(', ')}]`).join('\n')}`;
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${userApiKey}`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: userPrompt }] }], systemInstruction: { parts: [{ text: systemPrompt }] }, generationConfig: { responseMimeType: "application/json" } })
                        });
                        const data = await response.json();
                        const result = JSON.parse(data.candidates[0].content.parts[0].text);
                        const newResults = { ...currentResults };
                        activeKeys.forEach(k => { if (result[k]) newResults[k] = result[k]; else drawSingle(k); });
                        setCurrentResults(newResults);
                    } catch (e) { visibleCategories.forEach(k => drawSingle(k)); } finally { setIsAiDrawing(false); }
                }
            };

            const generateSentence = async () => {
                if (!userApiKey) { setAiSentence("請至設定（⚙️）填寫金鑰。"); setIsInstructorOpen(true); return; }
                setIsAiLoading(true); setAiSentence(""); setIsInstructorOpen(true);
                try {
                    const words = Object.entries(currentResults).filter(([k]) => visibleCategories.includes(k)).map(([k,v]) => `${k}: ${v}`).join(', ');
                    const isPattern = drawMode === 'pattern' && sentencePattern.trim();
                    const prompt = `用語詞「${words}」造生活化句子。禁用 ** 或 __ 標示語詞。${isPattern ? `使用句型：「${sentencePattern}」。` : ''}`;
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${userApiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await response.json();
                    setAiSentence(data.candidates[0].content.parts[0].text);
                } catch (e) { setAiSentence("造句失敗，請確認 API 金鑰。"); } finally { setIsAiLoading(false); }
            };

            const renderHighlightedSentence = (sentence) => {
                if (!sentence) return null;
                const clean = sentence.replace(/[\*_`]/g, '');
                const keywords = visibleCategories.map(cat => currentResults[cat]).filter(Boolean).sort((a,b) => b.length - a.length);
                if (keywords.length === 0) return clean;
                const regex = new RegExp(`(${keywords.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|')})`, 'g');
                return clean.split(regex).map((part, i) => keywords.includes(part) ? <span key={i} className="text-indigo-600 underline underline-offset-4 decoration-indigo-300 decoration-2 font-black mx-1 inline-block">{part}</span> : part);
            };

            const gridClass = useMemo(() => {
                const c = visibleCategories.length;
                if (c <= 4) return "grid-cols-1 sm:grid-cols-2";
                if (c <= 6) return "grid-cols-2 sm:grid-cols-3";
                return "grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5";
            }, [visibleCategories]);

            return (
                <div className="flex flex-col h-screen overflow-hidden">
                    <header className="bg-white border-b px-6 py-3 flex items-center justify-between shadow-sm z-30 shrink-0">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-600 p-2 rounded-2xl text-white shadow-xl"><Icon name="BookOpen" size={24} /></div>
                            <div><h1 className="text-xl font-black text-slate-900 mb-1">造句靈感抽卡器</h1><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest font-mono">Creative Sentences Lab</p></div>
                            <div className="relative ml-2 tooltip-trigger"><button className="p-1 text-slate-300 hover:text-indigo-500"><Icon name="HelpCircle" size={20} /></button>
                                <div className="absolute top-10 left-0 w-72 bg-slate-800 text-white p-5 rounded-2xl text-xs z-[100] shadow-2xl border border-slate-700 pointer-events-none tooltip-box">
                                    <h4 className="font-black mb-3 border-b border-slate-600 pb-2">工具使用說明</h4>
                                    <ul className="space-y-2 opacity-90">
                                        <li>1. 點擊「DRAW」單抽。</li>
                                        <li>2. 「一鍵全抽」快速抽取。</li>
                                        <li>3. 「指定句型」模式可限制語法。</li>
                                        <li>4. 點擊「⚙️」設定重複機制與填寫 API 金鑰。</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="hidden lg:flex items-center gap-3 bg-slate-50 p-1.5 rounded-2xl border border-slate-100 shadow-inner">
                                <span className="text-[10px] font-black text-slate-400 uppercase ml-2">抽卡模式</span>
                                <div className="flex gap-1">
                                    {['random', 'logical', 'pattern'].map(m => (
                                        <button key={m} onClick={() => setDrawMode(m)} className={`px-4 py-1.5 text-xs font-black rounded-xl transition-all ${drawMode === m ? 'bg-white shadow-sm text-indigo-600 border border-indigo-50' : 'text-slate-400'}`}>
                                            {m === 'random' ? '絕對亂數' : m === 'logical' ? '合理情境' : '指定句型'}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <button onClick={() => setShowDataEditor(true)} className="p-2.5 bg-slate-50 border rounded-xl hover:bg-slate-100 text-slate-600"><Icon name="Layout" size={20} /></button>
                            <button onClick={() => setShowSettings(!showSettings)} className={`p-2.5 rounded-xl transition-all bg-white border ${showSettings ? 'bg-indigo-50 text-indigo-600' : ''}`}><Icon name="Settings" size={20} /></button>
                            <button onClick={handleDrawAll} disabled={isAiDrawing} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-2xl font-black shadow-lg flex items-center gap-2 active:scale-95">
                                {isAiDrawing ? <div className="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full" /> : <Icon name="ListRestart" size={20} />} 一鍵全抽
                            </button>
                        </div>
                    </header>

                    {drawMode === 'pattern' && (
                        <div className="bg-indigo-50 border-b px-6 py-2 flex items-center gap-4 animate-in">
                            <Icon name="Type" size={16} className="text-indigo-700" />
                            <input type="text" placeholder="例如：一邊…一邊…/雖然…但是…/（主詞）（時間）都會（動詞）" className="flex-1 bg-white border-2 border-indigo-200 rounded-xl px-4 py-1.5 text-sm font-bold focus:outline-none focus:border-indigo-400" value={sentencePattern} onChange={e => setSentencePattern(e.target.value)} />
                        </div>
                    ) }

                    {showSettings && (
                        <div className="absolute top-16 right-6 w-96 bg-white border-2 shadow-2xl rounded-[2.5rem] p-6 z-50 animate-in">
                            <div className="flex justify-between items-center mb-6"><h3 className="font-black text-xl text-slate-900">系統設定</h3><button onClick={() => setShowSettings(false)} className="text-slate-400"><Icon name="X" size={20} /></button></div>
                            <div className="space-y-6">
                                <div className="p-4 bg-indigo-50 rounded-3xl border border-indigo-100">
                                    <span className="font-black block text-indigo-900 text-sm mb-2">Gemini API 金鑰（必填）</span>
                                    <input type="password" placeholder="貼上您的 API 金鑰..." className="w-full bg-white border-2 border-indigo-200 rounded-xl px-4 py-2 text-xs font-bold focus:outline-none shadow-inner" value={userApiKey} onChange={e => setUserApiKey(e.target.value)} />
                                    <p className="text-[10px] text-indigo-400 mt-2 font-bold italic">※ 金鑰僅儲存於您的瀏覽器中。</p>
                                </div>
                                <label className="flex items-center justify-between p-4 bg-slate-50 rounded-3xl cursor-pointer">
                                    <span className="font-black block text-slate-800">允許重複抽出</span>
                                    <input type="checkbox" checked={allowRepeat} onChange={() => setAllowRepeat(!allowRepeat)} className="w-6 h-6 rounded-lg text-indigo-600" />
                                </label>
                                <div><span className="font-black block mb-3 text-slate-800 text-sm font-black">顯示卡片類型</span>
                                    <div className="grid grid-cols-2 gap-2 max-h-[25vh] overflow-y-auto p-2 border-2 border-slate-50 rounded-3xl bg-slate-50/50">
                                        {Object.keys(dataStore).map(cat => (
                                            <label key={cat} className={`flex items-center gap-2 p-3 rounded-2xl cursor-pointer border ${visibleCategories.includes(cat) ? 'bg-white border-indigo-200 text-indigo-700 shadow-sm' : 'bg-transparent text-slate-400 opacity-60'}`}>
                                                <input type="checkbox" checked={visibleCategories.includes(cat)} onChange={e => { if (e.target.checked) setVisibleCategories([...visibleCategories, cat]); else if (visibleCategories.length > 1) setVisibleCategories(visibleCategories.filter(v => v !== cat)); }} />
                                                <span className="text-xs font-black">{cat}</span>
                                            </label>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {showDataEditor && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-md z-[60] flex items-center justify-center p-6">
                            <div className="bg-white w-full max-w-5xl h-[85vh] rounded-[3rem] shadow-2xl flex flex-col overflow-hidden animate-in">
                                <div className="p-8 border-b flex justify-between items-center bg-slate-50">
                                    <div className="flex items-center gap-4"><div className="bg-indigo-600 p-3 rounded-2xl text-white shadow-lg"><Icon name="Edit3" size={24} /></div><div><h2 className="text-2xl font-black text-slate-900">自定義內容管理</h2><p className="text-xs font-bold text-slate-400">增減類型與語詞庫</p></div></div>
                                    <button onClick={() => {setShowDataEditor(false); setEditingCategory(null);}} className="p-2 border rounded-full hover:bg-slate-200 transition-colors"><Icon name="X" size={20}/></button>
                                </div>
                                <div className="flex-1 flex overflow-hidden">
                                    <div className="w-1/3 border-r overflow-y-auto p-6 bg-slate-50/50 space-y-2">
                                        <button onClick={() => { const n = window.prompt("新類型名稱："); if (n && !dataStore[n]) { setDataStore({...dataStore, [n]:[]}); setHistories({...histories, [n]:[]}); setVisibleCategories([...visibleCategories, n]); } }} className="w-full p-4 border-2 border-dashed border-indigo-200 text-indigo-600 rounded-3xl font-black flex items-center justify-center gap-2 hover:bg-white transition-all mb-4"><Icon name="Plus" size={20} /> 新增類型</button>
                                        {Object.keys(dataStore).map(cat => (
                                            <div key={cat} className={`group flex items-center justify-between p-4 rounded-3xl border-2 transition-all cursor-pointer ${editingCategory === cat ? 'bg-indigo-600 border-indigo-600 text-white shadow-xl' : 'bg-white hover:border-indigo-100'}`} onClick={() => setEditingCategory(cat)}><span className="font-bold">{cat}</span>
                                                <button onClick={(e) => { e.stopPropagation(); if(window.confirm(`確定刪除 ${cat} 嗎？`)) { const next = {...dataStore}; delete next[cat]; setDataStore(next); setVisibleCategories(visibleCategories.filter(v => v !== cat)); } }} className="p-1.5 opacity-0 group-hover:opacity-100 hover:bg-red-500 rounded-lg text-slate-400 hover:text-white transition-all"><Icon name="Trash2" size={14}/></button>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="flex-1 bg-white p-8">
                                        {editingCategory ? (
                                            <div className="h-full flex flex-col animate-in"><h4 className="font-black text-slate-900 mb-4 text-lg">正在編輯：<span className="text-indigo-600">{editingCategory}</span></h4><textarea className="flex-1 w-full bg-slate-50 border-2 rounded-[2rem] p-6 font-bold text-lg focus:outline-none focus:border-indigo-400 resize-none shadow-inner leading-relaxed" placeholder="每行一語詞..." value={(dataStore[editingCategory] || []).join('\n')} onChange={e => { const words = [...new Set(e.target.value.split('\n').map(s => s.trim()).filter(s => s))]; setDataStore({...dataStore, [editingCategory]: words}); }} /></div>
                                        ) : <div className="h-full flex flex-col items-center justify-center text-slate-300 opacity-50"><Icon name="Edit3" size={64} /><p className="font-black text-xl mt-4 font-black">選擇類型開始編輯</p></div>}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <main className="flex-1 p-6 flex items-center justify-center min-h-0 overflow-y-auto">
                        <div className={`grid ${gridClass} gap-4 w-full h-full max-w-[1600px]`}>
                            {visibleCategories.map(cat => (
                                <div key={cat} className={`relative flex flex-col rounded-[2.5rem] border-4 shadow-2xl overflow-hidden transition-all duration-300 ${currentResults[cat] ? 'scale-100' : 'opacity-40 scale-95'} ${COLOR_MAP[cat] || 'bg-white border-slate-200'}`}>
                                    <div className="px-5 py-3 flex justify-between bg-black/5 items-center"><span className="text-[10px] font-black uppercase tracking-wider font-mono">{cat}</span>
                                        <div className="flex gap-2"><button onClick={() => setShowHistoryModal(cat)}><Icon name="History" size={14}/></button><button onClick={() => resetCategory(cat)}><Icon name="RotateCcw" size={14}/></button></div>
                                    </div>
                                    <div className="flex-1 flex items-center justify-center p-6 text-center min-h-0">{currentResults[cat] ? <div className="text-xl sm:text-2xl font-black text-slate-900 animate-in drop-shadow-sm leading-tight">{currentResults[cat]}</div> : <div className="text-slate-400 text-[10px] tracking-[0.3em] opacity-20 italic font-black uppercase font-mono">READY</div>}</div>
                                    <button onClick={() => drawSingle(cat)} disabled={isExhausted(cat)} className="py-5 text-xs font-black bg-black/5 hover:bg-black/10 active:scale-95 disabled:opacity-50 uppercase font-mono tracking-widest">{isExhausted(cat) ? "Empty" : "DRAW"}</button>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* 造句指導員 */}
                    <section className={`fixed bottom-0 left-0 right-0 bg-white border-t-2 shadow-2xl transition-all duration-500 z-40 ${isInstructorOpen ? 'translate-y-0' : 'translate-y-[calc(100%-48px)]'}`}>
                        <button onClick={() => setIsInstructorOpen(!isInstructorOpen)} className="w-full h-12 flex items-center justify-center gap-2 bg-slate-50 hover:bg-slate-100 transition-colors border-b">
                            {isInstructorOpen ? <Icon name="ChevronDown" size={16}/> : <Icon name="ChevronUp" size={16}/>}
                            <Icon name="Sparkles" size={16} className="text-indigo-600" /> <span className="text-xs font-black text-slate-500 tracking-widest uppercase font-black">造句指導員</span>
                        </button>
                        <div className="p-8 md:px-16 max-w-7xl mx-auto flex flex-col md:flex-row gap-8 items-center">
                            <div className="flex-1 w-full bg-indigo-50 border-4 border-dashed border-indigo-100 rounded-[2.5rem] p-8 flex items-center justify-center text-center shadow-inner min-h-[120px]">
                                {isAiLoading ? <div className="animate-pulse font-black text-indigo-500">正在為您構思精采內容...</div> : <div className="text-xl md:text-3xl font-bold font-serif tracking-wide leading-relaxed">{aiSentence ? <span>「 {renderHighlightedSentence(aiSentence)} 」</span> : "準備就緒，點擊右側按鈕造句"}</div>}
                            </div>
                            <button onClick={generateSentence} disabled={isAiLoading || !Object.keys(currentResults).length} className="bg-slate-900 text-white px-12 py-8 rounded-[2rem] font-black flex flex-col items-center gap-3 active:scale-95 transition-all disabled:bg-slate-200">
                                <div className="bg-indigo-500 p-3 rounded-2xl shadow-lg transition-transform hover:scale-110"><Icon name="Sparkles" size={28} /></div><span className="text-xs tracking-widest uppercase font-black">生成句子</span>
                            </button>
                        </div>
                    </section>

                    {showHistoryModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-md z-[100] flex items-center justify-center p-6" onClick={() => setShowHistoryModal(null)}>
                            <div className="bg-white w-full max-w-md rounded-[3rem] overflow-hidden animate-in shadow-2xl" onClick={e => e.stopPropagation()}>
                                <div className={`p-6 text-center font-black text-xl flex justify-between items-center ${COLOR_MAP[showHistoryModal] || 'bg-slate-200'}`}>
                                    <div className="flex items-center gap-3"><Icon name="History" size={24} /> <span>抽卡紀錄</span></div><button onClick={() => setShowHistoryModal(null)} className="hover:rotate-90 transition-transform"><Icon name="X" size={20}/></button>
                                </div>
                                <div className="p-6 space-y-3 max-h-[60vh] overflow-y-auto bg-slate-50">
                                    {(histories[showHistoryModal] || []).length > 0 ? histories[showHistoryModal].map((v, i) => (
                                        <div key={i} className="flex items-center gap-4 p-4 bg-white rounded-2xl border-2 border-slate-100 shadow-sm"><span className="w-8 h-8 rounded-full bg-slate-900 text-white text-xs font-black flex items-center justify-center shrink-0">{(i+1).toString().padStart(2, '0')}</span><span className="font-bold text-lg">{v}</span></div>
                                    )) : <div className="text-center py-10 opacity-30 font-black uppercase">尚無紀錄</div>}
                                </div>
                                <div className="p-4 bg-white border-t flex justify-center"><button onClick={() => setShowHistoryModal(null)} className="px-10 py-2 bg-slate-900 text-white rounded-full font-black text-sm active:scale-95 shadow-md">關閉</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
